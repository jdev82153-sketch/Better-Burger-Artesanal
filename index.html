<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Better Burger Artesanal | Jales/SP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  /* =============================================
     VARIÁVEIS & RESET
  ============================================= */
  :root {
    --black:    #0a0a0a;
    --dark:     #111111;
    --dark2:    #1a1a1a;
    --card-bg:  #161616;
    --red:      #e02020;
    --red-glow: rgba(224, 32, 32, 0.35);
    --orange:   #ff6b1a;
    --gold:     #f5a623;
    --white:    #f5f0eb;
    --gray:     #888;
    --radius:   16px;
    --shadow:   0 8px 40px rgba(0,0,0,0.6);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    font-size: 16px;
    line-height: 1.5;
    overflow-x: hidden;
  }

  img { display: block; max-width: 100%; }

  a { color: inherit; text-decoration: none; }

  /* =============================================
     UTILITÁRIOS
  ============================================= */
  .section-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 4px 14px;
    border-radius: 100px;
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 8vw, 4.5rem);
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--white);
  }

  .highlight { color: var(--red); }

  /* =============================================
     ANIMAÇÕES DE ENTRADA
  ============================================= */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-40px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulseRed {
    0%, 100% { box-shadow: 0 0 0 0 var(--red-glow); }
    50%       { box-shadow: 0 0 0 12px transparent; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(-2deg); }
    50%       { transform: translateY(-12px) rotate(2deg); }
  }
  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10%      { transform: translate(-2%, -3%); }
    30%      { transform: translate(2%, 2%); }
    50%      { transform: translate(-1%, 3%); }
    70%      { transform: translate(3%, -2%); }
    90%      { transform: translate(-3%, 1%); }
  }

  .animate { opacity: 0; }
  .animate.visible { animation: fadeUp 0.7s ease forwards; }

  /* =============================================
     NAV / HEADER
  ============================================= */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(10,10,10,0.95), transparent);
    backdrop-filter: blur(6px);
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-circle {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 2px solid var(--red);
    flex-shrink: 0;
  }

  /* ===================== SUBSTITUA =====================
     Troque o src abaixo pela URL da sua logo no GitHub  */
  .logo-circle img {
    width: 38px;
    height: 38px;
    object-fit: contain;
  }
  /* ==================================================== */

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.06em;
    line-height: 1.1;
    font-size: 1.1rem;
  }
  .logo-text span { display: block; color: var(--red); font-size: 0.7rem; }

  nav {
    display: flex;
    gap: 28px;
  }

  nav a {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray);
    transition: color 0.2s;
  }
  nav a:hover { color: var(--white); }

  .nav-cta {
    background: var(--red);
    color: var(--white) !important;
    padding: 8px 20px;
    border-radius: 100px;
    animation: pulseRed 2.5s infinite;
  }
  .nav-cta:hover { background: #ff3232 !important; color: var(--white) !important; }

  /* =============================================
     HERO
  ============================================= */
  .hero {
    position: relative;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    overflow: hidden;
    padding: 120px 24px 60px;
  }

  /* Grain texture */
  .hero::before {
    content: '';
    position: absolute;
    inset: -50%;
    width: 200%; height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    animation: grain 8s steps(10) infinite;
    z-index: 1;
  }

  /* Glow radial */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 60% 50%, rgba(224,32,32,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .hero-inner {
    position: relative;
    z-index: 2;
    max-width: 560px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(224,32,32,0.15);
    border: 1px solid rgba(224,32,32,0.4);
    color: var(--red);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 20px;
    animation: fadeIn 0.6s ease forwards;
  }
  .hero-badge::before {
    content: '●';
    font-size: 0.5rem;
    animation: pulseRed 1.5s infinite;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 14vw, 7rem);
    line-height: 0.92;
    letter-spacing: 0.02em;
    margin-bottom: 20px;
    animation: slideInLeft 0.8s ease 0.1s both;
  }

  .hero-title em {
    font-style: normal;
    color: var(--red);
    display: block;
  }

  .hero-sub {
    font-size: 1rem;
    color: var(--gray);
    font-weight: 300;
    max-width: 380px;
    margin-bottom: 36px;
    animation: fadeUp 0.8s ease 0.25s both;
  }

  .hero-buttons {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    animation: fadeUp 0.8s ease 0.4s both;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--red);
    color: #fff;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    padding: 16px 32px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    animation: pulseRed 2.5s infinite;
    text-decoration: none;
  }
  .btn-primary:hover { background: #ff3232; transform: translateY(-2px); box-shadow: 0 12px 30px rgba(224,32,32,0.4); }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: var(--white);
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    padding: 16px 28px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-decoration: none;
  }
  .btn-secondary:hover { border-color: var(--white); background: rgba(255,255,255,0.05); }

  .hero-img-wrap {
    position: absolute;
    right: -4%;
    top: 50%;
    transform: translateY(-50%);
    width: min(55%, 560px);
    z-index: 2;
    animation: float 6s ease-in-out infinite, fadeIn 1s ease 0.3s both;
    pointer-events: none;
  }
  .hero-img-wrap img {
    width: 100%;
    filter: drop-shadow(0 20px 60px rgba(224,32,32,0.4));
    border-radius: 20px;
    object-fit: cover;
  }

  /* =============================================
     PROMOÇÕES
  ============================================= */
  .section {
    padding: 80px 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .promo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 40px;
  }

  .promo-card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
  }
  .promo-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

  .promo-card-img {
    position: relative;
    height: 200px;
    overflow: hidden;
    background: #1e1e1e;
  }

  /* ===================== SUBSTITUA =====================
     Troque os src="" de cada imagem abaixo pela URL
     da imagem correspondente no seu GitHub.
     Exemplo: https://raw.githubusercontent.com/USUARIO/REPOSITORIO/main/imagem.jpg
  ==================================================== */
  .promo-card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }
  .promo-card:hover .promo-card-img img { transform: scale(1.08); }

  .promo-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--red);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
  }

  .promo-body {
    padding: 18px 20px 20px;
  }

  .promo-name {
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .promo-desc {
    font-size: 0.78rem;
    color: var(--gray);
    margin-bottom: 14px;
    line-height: 1.5;
  }

  .promo-price-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    margin-bottom: 16px;
  }

  .price-old {
    font-size: 0.85rem;
    color: var(--gray);
    text-decoration: line-through;
  }

  .price-new {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--red);
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .promo-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: rgba(224,32,32,0.12);
    border: 1px solid rgba(224,32,32,0.4);
    color: var(--red);
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    text-decoration: none;
  }
  .promo-btn:hover { background: var(--red); color: #fff; }

  .promo-btn svg { width: 16px; height: 16px; fill: currentColor; }

  /* =============================================
     SOBRE / INFORMAÇÕES
  ============================================= */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 40px;
  }

  .info-card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 28px 26px;
  }

  .info-card.full { grid-column: 1 / -1; }

  .info-icon {
    font-size: 1.8rem;
    margin-bottom: 12px;
  }

  .info-card h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    color: var(--white);
  }

  .info-card p, .info-card li {
    font-size: 0.85rem;
    color: var(--gray);
    line-height: 1.7;
  }

  .info-card ul { list-style: none; }
  .info-card li::before { content: '— '; color: var(--red); font-weight: 700; }

  .hours-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.84rem;
  }
  .hours-row:last-child { border-bottom: none; }
  .hours-row .day { color: var(--white); font-weight: 500; }
  .hours-row .time { color: var(--gray); }
  .hours-row .closed { color: var(--red); font-weight: 700; }

  .fidelidade-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    background: linear-gradient(135deg, rgba(224,32,32,0.12), rgba(255,107,26,0.08));
    border: 1px solid rgba(224,32,32,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    margin-top: 14px;
  }
  .fidelidade-bar .big { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--red); line-height: 1; }
  .fidelidade-bar p { font-size: 0.8rem; color: var(--gray); }
  .fidelidade-bar strong { color: var(--white); }

  /* =============================================
     CARDÁPIO
  ============================================= */
  .menu-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-top: 30px;
    scrollbar-width: none;
  }
  .menu-tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex-shrink: 0;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--gray);
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active, .tab-btn:hover {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  .menu-panel { display: none; margin-top: 30px; }
  .menu-panel.active { display: block; }

  .menu-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .menu-item:hover { border-color: rgba(224,32,32,0.3); transform: translateY(-3px); }

  .menu-item-img {
    width: 90px;
    height: 90px;
    flex-shrink: 0;
    overflow: hidden;
    background: #1e1e1e;
  }
  .menu-item-img img { width: 100%; height: 100%; object-fit: cover; }

  .menu-item-info { padding: 14px 14px 14px 0; flex: 1; }
  .menu-item-info h4 { font-weight: 700; font-size: 0.88rem; margin-bottom: 4px; line-height: 1.3; }
  .menu-item-info p { font-size: 0.73rem; color: var(--gray); margin-bottom: 8px; line-height: 1.4; }
  .menu-item-price { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--red); letter-spacing: 0.04em; }

  /* =============================================
     WHATSAPP FLOAT
  ============================================= */
  .wa-float {
    position: fixed;
    bottom: 28px;
    right: 24px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 12px;
    background: #25d366;
    color: #fff;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 14px 22px;
    border-radius: 100px;
    box-shadow: 0 8px 30px rgba(37,211,102,0.4);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
    animation: fadeUp 0.8s ease 1s both;
  }
  .wa-float:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 14px 40px rgba(37,211,102,0.5); }
  .wa-float svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }

  /* =============================================
     FOOTER
  ============================================= */
  footer {
    background: var(--dark2);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 40px 24px 32px;
    text-align: center;
  }

  footer .footer-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  footer .footer-logo span { color: var(--red); }

  footer p {
    font-size: 0.75rem;
    color: var(--gray);
    line-height: 1.8;
  }

  footer .footer-links {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 16px 0;
    flex-wrap: wrap;
  }

  footer .footer-links a {
    font-size: 0.75rem;
    color: var(--gray);
    transition: color 0.2s;
  }
  footer .footer-links a:hover { color: var(--white); }

  /* =============================================
     DIVISOR
  ============================================= */
  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(224,32,32,0.4), transparent);
    margin: 0 auto;
    max-width: 600px;
  }

  /* =============================================
     RESPONSIVE
  ============================================= */
  @media (max-width: 768px) {
    header { padding: 12px 16px; }
    nav { display: none; }

    .hero { padding: 100px 20px 280px; }
    .hero-img-wrap {
      position: absolute;
      right: -10%;
      bottom: 20px;
      top: auto;
      transform: none;
      width: 80%;
    }

    .about-grid { grid-template-columns: 1fr; }

    .promo-grid { grid-template-columns: 1fr; }

    .section { padding: 60px 16px; }

    .wa-float span { display: none; }
    .wa-float { padding: 16px; border-radius: 50%; }
  }

  @media (max-width: 480px) {
    .hero-title { font-size: clamp(3rem, 18vw, 5rem); }
    .menu-list { grid-template-columns: 1fr; }
  }
</style>
</head>
